.wrap{max-width:1440px;margin:0 auto;padding:1.25rem 1.5rem}

.pat-badge{font-size:.66rem;padding:.15rem .5rem;border-radius:12px;font-weight:500}
.pat-spread{margin-left:auto;font-size:.72rem;color:var(--tx2)}
.pat-spread b{color:var(--r1);font-weight:700}
.pat-table{width:100%;border-collapse:collapse;font-size:.78rem}

.pat-table tbody td{padding:.5rem .65rem;border-bottom:1px solid rgba(0,0,0,.04)}

.pat-diff{font-size:.68rem;font-weight:600;padding:.1rem .35rem;border-radius:4px}

// ===== PROCESS =====
function procAlho(items){
  return items.map(r=>{
    const cx=r.qty/10,gcx=(r.pskp-r.cm)*10,pg=gcx*cx;
    const m=r.pskp>0?((r.pskp-r.cm)/r.pskp)*100:0;
    const diasEst=r.mdv>0?(r.qty/r.mdv):Infinity;
    // Parse calibre, classe, tipo
    const sp=r.sp;
    const cm2=sp.match(/N(\d+)/);const calibre=cm2?'N'+cm2[1]:'Outros';
    const classe=sp.includes('2ª')?'2ª':sp.includes('1ª')?'1ª':'N/C';
    const tipo=sp.toLowerCase().includes('palha')?'Palha':sp.toLowerCase().includes('limpo')?'Limpo':'Outro';
    const marca=r.p.replace('ALHO ARG. ','').trim();
    return{...r,cx:Math.round(cx),gcx,pg,m,diasEst,calibre,classe,tipo,marca};
  }).sort((a,b)=>b.pg-a.pg);
}
function procGen(items){
  return items.map(r=>{
    const gu=r.pskp-r.cm,pg=gu*r.qty;
    const m=r.pskp>0?((r.pskp-r.cm)/r.pskp)*100:0;
    const diasEst=r.mdv>0?(r.qty/r.mdv):Infinity;
    return{...r,gu,pg,m,diasEst};
  }).sort((a,b)=>b.pg-a.pg);
}

// ======= ALHO =======
function buildAlho(){
  const sec=mkSec(1,false);
  const items=procAlho(GRP['Alho']||[]);
  const tQty=items.reduce((s,r)=>s+r.qty,0),tCx=items.reduce((s,r)=>s+r.cx,0);
  const tG=items.reduce((s,r)=>s+r.pg,0),tC=items.reduce((s,r)=>s+r.qty*r.cm,0);
  const tV=items.reduce((s,r)=>s+r.qty*r.pskp,0),mM=tV>0?(tG/tV)*100:0;

  // By marca
  const bm={};items.forEach(r=>{if(!bm[r.marca])bm[r.marca]={marca:r.marca,qty:0,cx:0,g:0,c:0,v:0,n:0,mdvT:0,mdvN:0};
    bm[r.marca].qty+=r.qty;bm[r.marca].cx+=r.cx;bm[r.marca].g+=r.pg;bm[r.marca].c+=r.qty*r.cm;bm[r.marca].v+=r.qty*r.pskp;bm[r.marca].n++;
    if(r.mdv>0){bm[r.marca].mdvT+=r.mdv;bm[r.marca].mdvN++}});
  const marcas=Object.values(bm).sort((a,b)=>b.g-a.g);
  marcas.forEach(m=>m.m=m.v>0?(m.g/m.v)*100:0);

  // By calibre
  const bc={};items.forEach(r=>{if(!bc[r.calibre])bc[r.calibre]={cal:r.calibre,qty:0,cx:0,g:0,n:0};
    bc[r.calibre].qty+=r.qty;bc[r.calibre].cx+=r.cx;bc[r.calibre].g+=r.pg;bc[r.calibre].n++});
  const calibres=Object.values(bc).sort((a,b)=>{const na=parseInt(a.cal.replace('N',''))||99;const nb=parseInt(b.cal.replace('N',''))||99;return na-nb});

  // By calibre+classe+tipo for comparison
  const bct={};items.forEach(r=>{const k=r.calibre+' | '+r.classe+' | '+r.tipo;
    if(!bct[k])bct[k]=[];bct[k].push(r)});



  sec.innerHTML=`
  <div class="sb"><strong>Grupo:</strong> Alho Argentino &nbsp;|&nbsp; <strong>ICMS:</strong> 7,00% &nbsp;|&nbsp; <strong>PIS/COF:</strong> Isento (CST 06) &nbsp;|&nbsp; <strong>Comissao:</strong> 2,30% &nbsp;|&nbsp; <strong>Carga:</strong> 9,30% &nbsp;|&nbsp; <strong>Conversão:</strong> CX10 = 10kg &nbsp;|&nbsp; <strong>Ganho/cx:</strong> (PreçoSKUPrim − CustoMédio) × 10 &nbsp;|&nbsp; <strong>Prev. ganho:</strong> Ganho/cx × QTD CX</div>
  <div class="g" style="grid-template-columns:repeat(5,1fr);margin-bottom:1.25rem">
    <div class="c k kg"><div class="l">Faturamento Potencial</div><div class="v">${fR(tV)}</div><div class="s">${items.length} SKUs</div></div>
    <div class="c k kb"><div class="l">Estoque</div><div class="v">${fmt(tQty,0)} kg</div><div class="s">${fmt(tCx,0)} cx | ${fR(tC)} em custo</div></div>
    <div class="c k ka"><div class="l">Resultado Liquido</div><div class="v">${fR(tV-tC-tV*0.093)}</div><div class="s">Carga 9,3% sobre faturamento</div></div>
    <div class="c k kt"><div class="l">Margem Bruta</div><div class="v">${fP(mM)}</div><div class="s">(Preco - CMV) / Preco</div></div>
    <div class="c k kg"><div class="l">Margem Liquida</div><div class="v">${fP(mM-9.3)}</div><div class="s">ICMS 7% + PIS/COF 0% + COM 2,3%</div></div>
  </div>

  <!-- MARCA SECTION -->
  <div class="st">Ganho por fornecedor/marca <span class="badge">${marcas.length} marcas</span></div>
  <div class="g g2">
    <div class="c"><div class="cw"><canvas id="al-bar"></canvas></div></div>
    <div class="c"><div class="cw"><canvas id="al-mg"></canvas></div></div>
  </div>

  <!-- CALIBRE SECTION -->
  <div class="st">Volume e ganho por calibre <span class="badge">${calibres.length} calibres</span></div>
  <div class="g g2">
    <div class="c"><div class="cw"><canvas id="al-cal"></canvas></div></div>
    <div class="c"><div class="cw"><canvas id="al-calg"></canvas></div></div>
  </div>

  <!-- COMPARISON BY PATTERN -->
  <div class="st">Comparativo por padrão (calibre × classificação × tipo)</div>
  <p style="font-size:.72rem;color:var(--tx2);margin-bottom:.5rem">Compare fornecedores para o mesmo padrao de alho. Cada bloco mostra o ranking por margem liquida, barra visual, e quanto cada fornecedor perde em relacao ao melhor.</p>
  <div class="fb">
    <label>Calibre:</label>
    <select id="al-pat-cal" onchange="showPatterns()">
      <option value="">Todos os calibres</option>
      ${calibres.map(c=>'<option value="'+c.cal+'">'+c.cal+' ('+fmt(c.qty,0)+' kg)</option>').join('')}
    </select>
    <label>Classificação:</label>
    <select id="al-pat-cls" onchange="showPatterns()">
      <option value="">Todas</option><option>1ª</option><option>2ª</option><option>N/C</option>
    </select>
    <label>Tipo:</label>
    <select id="al-pat-tipo" onchange="showPatterns()">
      <option value="">Todos</option><option>Palha</option><option>Limpo</option><option>Outro</option>
    </select>
  </div>
  <div id="al-pat-tb" style="max-height:700px;overflow-y:auto"></div>

  <!-- FULL TABLE -->
  <div class="st" style="margin-top:1.25rem">Análise completa por SKU <span class="badge">${items.length} SKUs</span></div>
  <div class="fb">
    <label>Marca:</label><select id="af1" onchange="fAlho()"><option value="">Todas</option>${[...new Set(items.map(r=>r.marca))].sort().map(m=>'<option>'+m+'</option>').join('')}</select>
    <label>Calibre:</label><select id="af2" onchange="fAlho()"><option value="">Todos</option>${[...new Set(items.map(r=>r.calibre))].sort((a,b)=>{const na=parseInt(a.replace('N',''))||99;const nb=parseInt(b.replace('N',''))||99;return na-nb}).map(c=>'<option>'+c+'</option>').join('')}</select>
    <label>Tipo:</label><select id="af3" onchange="fAlho()"><option value="">Todos</option><option>Palha</option><option>Limpo</option><option>Outro</option></select>
    <label>Ordenar:</label><select id="af4" onchange="fAlho()"><option value="pg">Maior resultado</option><option value="m">Maior margem liquida</option><option value="qty">Maior estoque</option><option value="gcx">Maior resultado/cx</option></select>
  </div>
  <div class="c"><div class="ts" style="max-height:600px"><table>
    <thead><tr><th>Marca</th><th>SubProduto</th><th style="text-align:right">Preco/kg</th><th style="text-align:right">CMV/kg</th><th>ICMS</th><th>PIS/COF</th><th>COM</th><th>Carga</th><th style="text-align:right">M.Bruta</th><th style="text-align:right">M.Liq.</th><th style="text-align:right">Est. kg</th><th style="text-align:right">CX10</th><th style="text-align:right">Fat.Pot.</th></tr></thead>
    <tbody id="al-tb"></tbody>
  </table></div></div>

  <div class="st" style="margin-top:1.25rem">Margem × Ganho por SKU</div>
  <div class="c"><div class="cw t"><canvas id="al-bub"></canvas></div></div>
  `;

  // Pattern comparison - table grouped by calibre
  window._alhoItems=items;
  window.showPatterns=function(){
    const fc=document.getElementById('al-pat-cal').value;
    const fcl=document.getElementById('al-pat-cls').value;
    const ft=document.getElementById('al-pat-tipo').value;
    let f=[..._alhoItems];
    if(fc)f=f.filter(r=>r.calibre===fc);
    if(fcl)f=f.filter(r=>r.classe===fcl);
    if(ft)f=f.filter(r=>r.tipo===ft);
    const groups={};
    f.forEach(r=>{const k=r.calibre+' | '+r.classe+' | '+r.tipo;if(!groups[k])groups[k]=[];groups[k].push(r)});
    const sorted=Object.entries(groups).sort((a,b)=>{
      const na=parseInt(a[0].match(/N(\d+)/)?.[1]||'99');
      const nb=parseInt(b[0].match(/N(\d+)/)?.[1]||'99');
      return na-nb;
    });
    let out='';
    sorted.forEach(([pattern,its])=>{
      if(its.length<2) return;
      const bestML=Math.max(...its.map(r=>r.ml||r.m));
      const bestP=Math.min(...its.map(r=>r.pskp));
      const worstML=Math.min(...its.map(r=>r.ml||r.m));
      const spread=Math.max(...its.map(r=>r.pskp))-bestP;
      const spreadPct=bestP>0?(spread/bestP*100):0;
      its.sort((a,b)=>(b.ml||b.m)-(a.ml||a.m));
      const parts=pattern.split(' | ');
      const maxML=Math.max(50,bestML+5);

      out+=`<div class="pat-group">`;
      out+=`<div class="pat-header">`;
      out+=`<span class="pat-label">${parts[0]}</span>`;
      out+=`<span class="pat-badge" style="background:var(--gh);color:var(--g2)">${parts[1]}</span>`;
      out+=`<span class="pat-badge" style="background:var(--bl);color:var(--b1)">${parts[2]}</span>`;
      out+=`<span class="pat-badge" style="background:var(--bg);color:var(--tx2)">${its.length} fornecedores</span>`;
      out+=`<span class="pat-spread">Spread de preco: <b>${fR(spread)}/kg</b> (${fP(spreadPct)})</span>`;
      out+=`</div>`;

      out+=`<table class="pat-table">`;
      out+=`<thead><tr><th style="width:26px"></th><th>Fornecedor</th><th style="text-align:right">Preco/kg</th><th style="text-align:right">CMV/kg</th><th style="text-align:right">M.Bruta</th><th style="text-align:right;min-width:90px">M.Liquida</th><th style="min-width:80px">Visual</th><th style="text-align:right">Dif. vs Melhor</th><th style="text-align:right">Est. kg</th><th style="text-align:right">Fat. Pot.</th></tr></thead>`;
      out+=`<tbody>`;
      its.forEach((r,i)=>{
        const ml=r.ml||r.m;
        const isBest=ml===bestML;
        const isWorst=ml===worstML&&its.length>2;
        const diffML=ml-bestML;
        const barW=Math.max(0,Math.min(100,(ml/maxML)*100));
        const barCol=ml>=30?'var(--g2)':ml>=15?'var(--a1)':'var(--r1)';
        const rankCls=i===0?'r1':i===1?'r2':'r3';
        const lostRev=diffML!==0?r.pskp*r.qty*Math.abs(diffML)/100:0;

        out+=`<tr class="${isBest?'best':isWorst?'worst':''}">`;
        out+=`<td><span class="pat-rank ${rankCls}">${i+1}</span></td>`;
        out+=`<td><strong>${r.marca}</strong></td>`;
        out+=`<td style="text-align:right">${fR(r.pskp)}${r.pskp===bestP?' <span style="font-size:.6rem;color:var(--b1)">menor</span>':''}</td>`;
        out+=`<td style="text-align:right;color:var(--tx2)">${fR(r.cm)}</td>`;
        out+=`<td style="text-align:right">${fP(r.mb)}</td>`;
        out+=`<td style="text-align:right;font-weight:700;color:${barCol}">${fP(ml)}</td>`;
        out+=`<td><div class="mg-bar"><div class="mg-bar-fill" style="width:${barW}%;background:${barCol}"></div></div></td>`;
        out+=`<td style="text-align:right">${diffML===0?'<span class="pat-diff zero">referencia</span>':'<span class="pat-diff loss">'+fP(diffML)+' ('+fR(lostRev)+' a menos)</span>'}</td>`;
        out+=`<td style="text-align:right">${fmt(r.qty,0)}</td>`;
        out+=`<td style="text-align:right">${fR(r.pskp*r.qty)}</td>`;
        out+=`</tr>`;
      });
      out+=`</tbody></table></div>`;
    });

    if(!out) out='<div style="padding:1rem;color:var(--tx2);font-size:.82rem">Nenhum padrao com multiplos fornecedores encontrado para os filtros selecionados.</div>';
    document.getElementById('al-pat-tb').innerHTML=out;
  };
  showPatterns();

  // Alho filter
  window.fAlho=function(){
    const f1=document.getElementById('af1').value,f2=document.getElementById('af2').value;
    const f3=document.getElementById('af3').value,f4=document.getElementById('af4').value;
    let f=[...items];
    if(f1)f=f.filter(r=>r.marca===f1);if(f2)f=f.filter(r=>r.calibre===f2);if(f3)f=f.filter(r=>r.tipo===f3);
    if(f4==='m')f.sort((a,b)=>b.m-a.m);else if(f4==='qty')f.sort((a,b)=>b.qty-a.qty);
    else if(f4==='gcx')f.sort((a,b)=>b.gcx-a.gcx);
    else f.sort((a,b)=>b.pg-a.pg);
    document.getElementById('al-tb').innerHTML=f.map(r=>{
      const tp=r.pg>20000;return`<tr class="${r.ml>30?'tr':r.ml<15?'ar':''}">
      <td><strong>${r.marca}</strong></td><td>${r.sp}</td>
      <td style="text-align:right">${fR(r.pskp)}</td><td style="text-align:right">${fR(r.cm)}</td>
      <td><span class="pill pb" style="font-size:.65rem">${fP(r.icms)}</span></td>
      <td><span class="pill pt" style="font-size:.65rem">${fP(r.pc)}</span></td>
      <td><span class="pill" style="font-size:.65rem;background:#eeedfe;color:#534ab7">${fP(r.com)}</span></td>
      <td>${cargaPill(r.cg)}</td>
      <td style="text-align:right">${mlPill(r.mb)}</td>
      <td style="text-align:right">${mlPill(r.ml)}</td>
      <td style="text-align:right">${fmt(r.qty,0)}</td><td style="text-align:right">${fmt(r.cx,0)}</td>
      <td style="text-align:right" class="pos">${fR(r.pskp*r.qty)}</td>
      </tr>`}).join('');
  };
  fAlho();

  setTimeout(()=>{
    // Bar by marca
    new Chart(document.getElementById('al-bar'),{type:'bar',data:{labels:marcas.map(m=>m.marca),datasets:[{data:marcas.map(m=>m.g),backgroundColor:MARCA_COLORS.slice(0,marcas.length),borderRadius:5,barPercentage:.65}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fR(c.raw)}}},scales:{x:{ticks:{callback:v=>'R$'+(v/1000).toFixed(0)+'k'}},y:{ticks:{font:{size:10}}}}}});

    // Margin by marca
    new Chart(document.getElementById('al-mg'),{type:'bar',data:{labels:marcas.map(m=>m.marca),datasets:[{data:marcas.map(m=>m.m),backgroundColor:marcas.map(m=>m.m>=30?'#2d5a27':m.m>=20?'#d4820a':'#c0392b'),borderRadius:5,barPercentage:.55}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},title:{display:true,text:'Margem média por fornecedor (%)',font:{size:12}},tooltip:{callbacks:{label:c=>fP(c.raw)}}},scales:{x:{ticks:{callback:v=>v+'%'},suggestedMax:50},y:{ticks:{font:{size:10}}}}}});

    // Calibre volume
    new Chart(document.getElementById('al-cal'),{type:'bar',data:{labels:calibres.map(c=>c.cal),datasets:[{label:'Estoque (kg)',data:calibres.map(c=>c.qty),backgroundColor:'#1a5ca8',borderRadius:5,barPercentage:.6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:'Volume em estoque por calibre (kg)',font:{size:12}},tooltip:{callbacks:{label:c=>fmt(c.raw,0)+' kg'}}},scales:{y:{ticks:{callback:v=>(v/1000).toFixed(0)+'k'}}}}});

    // Calibre ganho
    new Chart(document.getElementById('al-calg'),{type:'bar',data:{labels:calibres.map(c=>c.cal),datasets:[{label:'Ganho (R$)',data:calibres.map(c=>c.g),backgroundColor:'#2d5a27',borderRadius:5,barPercentage:.6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:true,text:'Ganho potencial por calibre (R$)',font:{size:12}},tooltip:{callbacks:{label:c=>fR(c.raw)}}},scales:{y:{ticks:{callback:v=>'R$'+(v/1000).toFixed(0)+'k'}}}}});

    // Bubble
    new Chart(document.getElementById('al-bub'),{type:'bubble',data:{datasets:items.map(r=>({label:r.marca+' - '+r.sp,data:[{x:r.ml||r.m,y:r.pg,r:Math.max(3,Math.min(18,r.cx/60))}],backgroundColor:'rgba(45,90,39,.35)',borderColor:'#2d5a27',borderWidth:1}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const d=c.dataset;return d.label+' | Margem: '+fP(c.raw.x)+' | Ganho: '+fR(c.raw.y)}}}},scales:{x:{title:{display:true,text:'Margem (%)'},min:0,max:50},y:{title:{display:true,text:'Previsão de Ganho (R$)'},ticks:{callback:v=>'R$'+(v/1000).toFixed(0)+'k'}}}}});
  },200);
}

// ======= GENERIC GROUP =======
function buildGroup(gName,idx){
  const sec=mkSec(idx,false);
  const items=procGen(GRP[gName]||[]);
  const tQty=items.reduce((s,r)=>s+r.qty,0),tG=items.reduce((s,r)=>s+r.pg,0);
  const tC=items.reduce((s,r)=>s+r.qty*r.cm,0),tV=items.reduce((s,r)=>s+r.qty*r.pskp,0);
  const mM=tV>0?(tG/tV)*100:0;const nP=new Set(items.map(r=>r.p)).size;
  const ul=items[0]?.skp==='KG'?'kg':'un';
  const alertN=items.filter(r=>r.m<0);

  // Subgroups
  const bsg={};items.forEach(r=>{if(!bsg[r.sg])bsg[r.sg]={sg:r.sg,qty:0,g:0,c:0,v:0,ps:new Set(),n:0};
    bsg[r.sg].qty+=r.qty;bsg[r.sg].g+=r.pg;bsg[r.sg].c+=r.qty*r.cm;bsg[r.sg].v+=r.qty*r.pskp;bsg[r.sg].ps.add(r.p);bsg[r.sg].n++});
  const sgs=Object.values(bsg).sort((a,b)=>b.g-a.g);sgs.forEach(s=>s.np=s.ps.size);

  // MDV

  const col=GC[gName]||'#1a5ca8';
  const kc={Alimentos:'kb',Azeite:'ka',Conservas:'kt',Embalagens:'kp','Potes Cabana':'kr'}[gName]||'kb';
  const avgIcms=items.length?items.reduce((s,r)=>s+(r.icms||7),0)/items.length:7;
  const avgPc=items.length?items.reduce((s,r)=>s+(r.pc||0),0)/items.length:0;
  const avgCg=avgIcms+avgPc+2.3;

  sec.innerHTML=`
  <div class="sb"><strong>Grupo:</strong> ${gName} &nbsp;|&nbsp; <strong>ICMS:</strong> 7,00% (CST 20) &nbsp;|&nbsp; <strong>PIS/COFINS:</strong> ${(avgPc===0)?'Isento (CST 06)':fP(avgPc)+' (CST 01)'} &nbsp;|&nbsp; <strong>Comissao:</strong> 2,30% &nbsp;|&nbsp; <strong>Carga Total:</strong> ${fP(avgCg)} &nbsp;|&nbsp; <strong>Margem Liquida Media:</strong> ${fP(mM-avgCg)}</div> (PreçoSKUPrim − CustoMédio) × Quantidade</div>
  ${alertN.length>0?`<div class="alert"><strong>⚠ Atenção:</strong> ${alertN.length} item(ns) com margem negativa. Verificar precificação.</div>`:''}
  <div class="g" style="grid-template-columns:repeat(5,1fr);margin-bottom:1.25rem">
    <div class="c k ${tG>=0?'kg':'kr'}"><div class="l">Faturamento Potencial</div><div class="v">${fR(tV)}</div><div class="s">${nP} produtos | ${items.length} SKUs</div></div>
    <div class="c k kb"><div class="l">Custo em Estoque</div><div class="v">${fR(tC)}</div><div class="s">${fmt(tQty,0)} ${ul} em estoque</div></div>
    <div class="c k ka"><div class="l">Resultado Liquido</div><div class="v">${fR(tV-tC-tV*avgCg/100)}</div><div class="s">Fat - CMV - Carga (${fP(avgCg)})</div></div>
    <div class="c k kt"><div class="l">Margem Bruta</div><div class="v">${fP(mM)}</div><div class="s">(Preco - CMV) / Preco</div></div>
    <div class="c k kg"><div class="l">Margem Liquida</div><div class="v">${fP(mM-avgCg)}</div><div class="s">ICMS ${fP(avgIcms)} + PIS/COF ${fP(avgPc)} + COM 2,3%</div></div>
  </div>
  <div class="st">Por subgrupo <span class="badge">${sgs.length}</span></div>
  <div class="g g2">
    <div class="c"><div class="cw${sgs.length>8?' t':''}"><canvas id="g${idx}-sg"></canvas></div></div>
    <div class="c"><div class="ts" style="max-height:${sgs.length>8?420:300}px"><table>
      <thead><tr><th>Subgrupo</th><th>Prod.</th><th style="text-align:right">Estoque</th><th style="text-align:right">Resultado</th><th style="text-align:right">Margem</th></tr></thead>
      <tbody>${sgs.map(s=>{const sm=s.v>0?(s.g/s.v)*100:0;const n=s.g<0;
      return`<tr class="${n?'ar':''}"><td><strong>${s.sg||'—'}</strong></td><td>${s.np}</td><td style="text-align:right">${fmt(s.qty,0)}</td><td style="text-align:right" class="${n?'neg':'pos'}">${fR(s.g)}</td><td style="text-align:right"><span class="pill ${sm>=30?'pg':sm>=15?'pa':'pr'}">${fP(sm)}</span></td></tr>`}).join('')}</tbody></table></div></div>
  </div>

  <div class="st" style="margin-top:1.25rem">Top 15 por resultado potencial</div>
  <div class="c"><div class="cw t"><canvas id="g${idx}-top"></canvas></div></div>

  <div class="st" style="margin-top:1.25rem">Tabela completa <span class="badge">${items.length}</span></div>
  <div class="fb">
    <label>Subgrupo:</label><select id="gf${idx}" onchange="fG${idx}()"><option value="">Todos</option>${[...new Set(items.map(r=>r.sg))].sort().map(s=>'<option>'+s+'</option>').join('')}</select>
    <label>Ordenar:</label><select id="gs${idx}" onchange="fG${idx}()"><option value="pg">Maior resultado</option><option value="m">Maior margem liquida</option><option value="qty">Maior estoque</option><option value="diasEst">Dias estoque ↑</option></select>
  </div>
  <div class="c"><div class="ts" style="max-height:550px"><table>
    <thead><tr><th>Produto</th><th>SubProduto</th><th style="text-align:right">Preco/${ul}</th><th style="text-align:right">CMV/${ul}</th><th>ICMS</th><th>PIS/COF</th><th>COM</th><th>Carga</th><th style="text-align:right">M.Bruta</th><th style="text-align:right">M.Liq.</th><th style="text-align:right">Estoque</th><th style="text-align:right">Fat.Pot.</th><th>ABC</th></tr></thead>
    <tbody id="gt${idx}"></tbody></table></div></div>`;

  window['gItems'+idx]=items;
  window['fG'+idx]=function(){
    const f=document.getElementById('gf'+idx).value,s=document.getElementById('gs'+idx).value;
    let fl=f?items.filter(r=>r.sg===f):[...items];
    if(s==='m')fl.sort((a,b)=>(b.ml||b.m)-(a.ml||a.m));else if(s==='qty')fl.sort((a,b)=>b.qty-a.qty);
    else fl.sort((a,b)=>b.pg-a.pg);
    document.getElementById('gt'+idx).innerHTML=fl.map(r=>{const n=r.m<0;
    return`<tr class="${(r.ml||r.m)<10?'ar':''}"><td><strong>${r.p.substring(0,28)}</strong></td><td>${r.sp||'—'}</td>
    <td style="text-align:right">${fR(r.pskp)}</td><td style="text-align:right">${fR(r.cm)}</td>
    <td><span class="pill pb" style="font-size:.65rem">${fP(r.icms||7)}</span></td>
    <td><span class="pill ${(r.pc||0)===0?'pt':'pa'}" style="font-size:.65rem">${fP(r.pc||0)}</span></td>
    <td><span class="pill" style="font-size:.65rem;background:#eeedfe;color:#534ab7">${fP(r.com||2.3)}</span></td>
    <td>${cargaPill(r.cg||9.3)}</td>
    <td style="text-align:right">${mlPill(r.mb||0)}</td>
    <td style="text-align:right">${mlPill(r.ml||0)}</td>
    <td style="text-align:right">${fmt(r.qty,0)} ${r.skp}</td>
    <td style="text-align:right" class="${(r.ml||r.m)<0?'neg':'pos'}">${fR(r.pskp*r.qty)}</td>
    <td>${r.abc?'<span class="pill '+(r.abc==='A'?'pg':r.abc==='B'?'pa':'pb')+'">'+r.abc+'</span>':''}</td></tr>`}).join('');
  };
  window['fG'+idx]();

  setTimeout(()=>{
    const tsg=sgs.slice(0,15);
    new Chart(document.getElementById('g'+idx+'-sg'),{type:'bar',data:{labels:tsg.map(s=>(s.sg||'—').substring(0,25)),datasets:[{data:tsg.map(s=>s.g),backgroundColor:tsg.map(s=>s.g>=0?col:'#c0392b'),borderRadius:5,barPercentage:.6}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fR(c.raw)}}},scales:{x:{ticks:{callback:v=>{const a=Math.abs(v);return(v<0?'-':'')+'R$'+(a>=1000?(a/1000).toFixed(0)+'k':a.toFixed(0))}}},y:{ticks:{font:{size:9}}}}}});
    const t15=items.filter(r=>r.pg>0).slice(0,15);
    new Chart(document.getElementById('g'+idx+'-top'),{type:'bar',data:{labels:t15.map(r=>(r.p.length>22?r.p.substring(0,22)+'…':r.p)+(r.sp?' ('+r.sp.substring(0,12)+')':'')),datasets:[{data:t15.map(r=>r.pg),backgroundColor:col+'cc',borderRadius:5,barPercentage:.6}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fR(c.raw)}}},scales:{x:{ticks:{callback:v=>'R$'+(v/1000).toFixed(1)+'k'}},y:{ticks:{font:{size:9}}}}}});
  },300);
}

buildOverview();
buildAlho();
['Alimentos','Azeite','Conservas','Embalagens','Potes Cabana'].forEach((g,i)=>buildGroup(g,i+2));
</script>
</body>
